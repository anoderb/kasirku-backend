name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/platform/projects/kasirku-backend
            git pull origin main
            docker build -t kasirku-backend .
            docker stop kasirku-backend || true
            docker rm kasirku-backend || true
            docker run -d \
              --name kasirku-backend \
              --network platform-network \
              --restart always \
              -p 127.0.0.1:4000:3000 \
              --env-file .env \
              kasirku-backend
            echo "Deploy success!"